name: ci

on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    pull_request:
        branches:
            - "master"
    workflow_dispatch:

permissions:
    packages: write
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    native:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version: 26
            - run: npm ci
            - run: npm run build
            - run: npm run lint
            - run: npm run typecheck
            - run: npm run test
            - name: Build npm tarball
              run: |
                  set -euo pipefail
                  npm -w packages/shared run build
                  pack_dir="$(mktemp -d)"
                  (cd packages/cross-seed && npm pack --workspaces=false --pack-destination "$pack_dir")
                  tarball="$(ls "$pack_dir"/cross-seed-*.tgz)"
                  cp "$tarball" "$GITHUB_WORKSPACE/cross-seed.tgz"
            - name: Smoke test npm tarball
              run: |
                  set -euo pipefail
                  npm -C "$GITHUB_WORKSPACE" install "file:cross-seed.tgz" --no-save --omit=dev
                  node "$GITHUB_WORKSPACE/node_modules/cross-seed/dist/cmd.js" --version
            - name: Upload npm tarball
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: cross-seed-tarball
                  path: cross-seed.tgz
                  if-no-files-found: error

    tarball-windows:
        needs: native
        runs-on: windows-latest
        steps:
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
              with:
                  node-version: 26
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: cross-seed-tarball
            - name: Show versions
              run: |
                  node -v
                  npm -v
                  npm config get prefix
                  npm root -g
            - name: Install tarball globally
              run: |
                  npm install -g .\cross-seed.tgz
            - name: Run cross-seed
              run: |
                  cross-seed --version

    docker-meta:
        if: ${{ github.event_name != 'pull_request' }}
        runs-on: ubuntu-latest
        outputs:
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
        steps:
            - name: Docker meta
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
              with:
                  images: |
                      ghcr.io/${{ github.repository_owner }}/cross-seed
                      crossseed/cross-seed
                  tags: |
                      type=semver,pattern=version-{{version}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=ref,event=branch
                      type=ref,event=pr
                      type=raw,value=prerelease,enable=${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

    docker-build:
        if: ${{ github.event_name != 'pull_request' }}
        needs: docker-meta
        environment: Docker Hub
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      runner: ubuntu-latest
                      platform: linux/amd64
                      suffix: -amd64
                    - arch: arm64
                      runner: ubuntu-24.04-arm
                      platform: linux/arm64
                      suffix: -arm64
        runs-on: ${{ matrix.runner }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
            - name: Login to GHCR
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Login to DockerHub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Prepare tags
              id: tags
              env:
                  TAGS: ${{ needs.docker-meta.outputs.tags }}
                  SUFFIX: ${{ matrix.suffix }}
              run: |
                  set -euo pipefail
                  tags=""
                  while IFS= read -r tag; do
                      [ -z "$tag" ] && continue
                      tags="${tags}${tag}${SUFFIX}"$'\n'
                  done <<< "$TAGS"
                  tags="${tags%$'\n'}"
                  if [ -z "$tags" ]; then
                      echo "No tags discovered from docker-meta output" >&2
                      exit 1
                  fi
                  printf 'tags<<EOF\n%s\nEOF\n' "$tags" >> "$GITHUB_OUTPUT"
            - name: Prepare build args
              id: build-args
              run: |
                  set -euo pipefail
                  echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
                  if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                      echo "build_branch=" >> "$GITHUB_OUTPUT"
                  else
                      echo "build_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                  fi
                  echo "build_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                  {
                      echo "build_message<<EOF"
                      git log -1 --pretty=%s
                      echo "EOF"
                  } >> "$GITHUB_OUTPUT"
                  echo "build_date=$(git log -1 --pretty=%cI)" >> "$GITHUB_OUTPUT"
            - name: Build and push temp image (${{ matrix.arch }})
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
              with:
                  push: true
                  platforms: ${{ matrix.platform }}
                  build-args: |
                      BUILD_COMMIT_SHA=${{ steps.build-args.outputs.commit_sha }}
                      BUILD_BRANCH=${{ steps.build-args.outputs.build_branch }}
                      BUILD_TAG=${{ steps.build-args.outputs.build_tag }}
                      BUILD_MESSAGE=${{ steps.build-args.outputs.build_message }}
                      BUILD_DATE=${{ steps.build-args.outputs.build_date }}
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/cross-seed:ci-${{ github.sha }}-${{ matrix.arch }}
                      crossseed/cross-seed:ci-${{ github.sha }}-${{ matrix.arch }}
                  labels: ${{ needs.docker-meta.outputs.labels }}
            - name: Smoke test image (${{ matrix.arch }})
              run:
                  docker run --rm ghcr.io/${{ github.repository_owner
                  }}/cross-seed:ci-${{ github.sha }}-${{ matrix.arch }}
                  --version
            - name: Promote temp tags (${{ matrix.arch }})
              env:
                  TAGS: ${{ steps.tags.outputs.tags }}
                  TEMP_GHCR:
                      ghcr.io/${{ github.repository_owner }}/cross-seed:ci-${{
                      github.sha }}-${{ matrix.arch }}
                  TEMP_DH:
                      crossseed/cross-seed:ci-${{ github.sha }}-${{ matrix.arch
                      }}
              run: |
                  set -euo pipefail
                  while IFS= read -r tag; do
                      [ -z "$tag" ] && continue
                      if [[ "$tag" == ghcr.io/* ]]; then
                          docker buildx imagetools create --tag "$tag" "$TEMP_GHCR"
                      else
                          docker buildx imagetools create --tag "$tag" "$TEMP_DH"
                      fi
                  done <<< "$TAGS"

    docker-manifest:
        if: ${{ github.event_name != 'pull_request' }}
        needs:
            - docker-meta
            - docker-build
        environment: Docker Hub
        runs-on: ubuntu-latest
        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
            - name: Login to GHCR
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Login to DockerHub
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Create multi-architecture manifests
              env:
                  TAGS: ${{ needs.docker-meta.outputs.tags }}
              run: |
                  set -euo pipefail
                  while IFS= read -r tag; do
                      [ -z "$tag" ] && continue
                      docker buildx imagetools create --tag "${tag}" "${tag}-amd64" "${tag}-arm64"
                  done <<< "$TAGS"
