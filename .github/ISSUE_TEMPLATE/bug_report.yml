name: Report a bug
description: "Something isn't working as expected."
labels: ["bug", "triage"]
body:
    - type: textarea
      attributes:
          label: What happened?
          description: Tell us what went wrong and what you expected instead.
      validations:
          required: true
    - type: textarea
      attributes:
          label: Steps to reproduce
          description: If you know how to reproduce it, list the steps.
          placeholder: |
              1.
              2.
              3.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Version and environment
          description: Share what you know. Exact versions help, but rough details are fine.
          value: |
              - cross-seed:
              - OS:
              - Install method: Docker / npm / other
              - Torrent client:
              - Prowlarr/Jackett:
          render: markdown
      validations:
          required: false
    - type: textarea
      attributes:
          label: Config or settings
          description: |
              Paste only the relevant settings if you can.
              Redact API keys, passwords, passkeys, and private hostnames.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Logs or screenshots
          description: |
              Paste relevant logs or drag in screenshots/log files if you have them.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Anything else?
          description: Links, related issues, or extra context.
      validations:
          required: false
