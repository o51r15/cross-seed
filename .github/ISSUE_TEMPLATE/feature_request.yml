name: Feature request
description: "I have an idea for cross-seed"
labels: ["feature", "triage"]
body:
    - type: textarea
      attributes:
          label: What would you like?
          description: Describe the feature or behavior you want.
      validations:
          required: true
    - type: textarea
      attributes:
          label: Why would this help?
          description: Tell us the problem or workflow this improves.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Anything else?
          description: Links, examples, screenshots, or implementation ideas.
      validations:
          required: false
